    // Helper pour les requêtes Supabase
    async function supabaseRequest(endpoint, method = 'GET', body = null) {
      const options = {
        method,
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        }
      };
      
      if (body) {
        options.body = JSON.stringify(body);
      }
      
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, options);
      
      if (!response.ok) {
        const error = await response.text();
        throw new Error(error);
      }
      
      return response.json();
    }

      const handleCSVImport = async (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const text = e.target.result;
            const lines = text.split('\n').filter(line => line.trim());
            
            // Ignorer la première ligne (header)
            const dataLines = lines.slice(1);
            
            const contactsToImport = [];
            let errors = [];
            
            dataLines.forEach((line, index) => {
              // Parser le CSV en gérant les guillemets
              const matches = line.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g);
              if (!matches || matches.length < 2) {
                errors.push(`Ligne ${index + 2}: Format invalide`);
                return;
              }
              
              const cleanValue = (val) => val ? val.replace(/^"|"$/g, '').trim() : '';
              
              const firstName = cleanValue(matches[0]);
              const lastName = cleanValue(matches[1]);
              const maidenName = matches[2] ? cleanValue(matches[2]) : '';
              const email = matches[3] ? cleanValue(matches[3]) : '';
              const phone = matches[4] ? cleanValue(matches[4]) : '';
              
              if (!firstName || !lastName) {
                errors.push(`Ligne ${index + 2}: Prénom et nom requis`);
                return;
              }
              
              // Validation email si présent
              if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errors.push(`Ligne ${index + 2}: Email invalide (${email})`);
                return;
              }
              
              contactsToImport.push({
                first_name: firstName,
                last_name: lastName,
                maiden_name: maidenName || null,
                email: email || null,
                phone: phone || null,
                email_verified: false,
                added_by: currentUserEmail || 'Import CSV Admin'
              });
            });
            
            if (errors.length > 0) {
              const continueImport = confirm(
                `${errors.length} erreur(s) détectée(s):\n\n${errors.slice(0, 5).join('\n')}${errors.length > 5 ? '\n...' : ''}\n\nContinuer l'import des contacts valides (${contactsToImport.length}) ?`
              );
              if (!continueImport) return;

              return;

            // Confirmation avant import

            event.target.value = '';

            alert('❌ Erreur lors de l\'import du fichier CSV.\n\nVérifiez le format du fichier.');

          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")

      };

      async function identifyUser() {
        // Si déjà identifié dans cette session, retourner le nom
        if (currentUserEmail) {
          return currentUserEmail;
        }
        
        // Demander le prénom
        const firstName = prompt('Pour informer la personne et vous créditer au leaderboard, quel est votre prénom ?\n\n(Laissez vide pour continuer sans vous identifier)');
        if (!firstName) {
          // L'utilisateur veut continuer sans s'identifier
          return 'Non identifié';
        }
        
        const normalizedInput = normalizeString(firstName.trim());
        
        // Chercher dans la base
        const matches = savedContacts.filter(c => 
          normalizeString(c.firstName).includes(normalizedInput)
        );
        
        if (matches.length === 0) {
          const choice = confirm(
            `❌ Nous ne trouvons pas "${firstName}" dans la liste.\n\n` +
            `Cliquez OK pour continuer quand même et contribuer en tant que "${firstName}"\n` +
            `Cliquez Annuler pour vous inscrire d'abord`
          );
          
          if (choice) {
            // L'utilisateur veut continuer quand même
            setCurrentUserEmail(firstName);
            return firstName;
          } else {
            // L'utilisateur veut s'inscrire d'abord
            setShowForm(true);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return null;
          }
        }
        
        if (matches.length === 1) {
          // Un seul match trouvé
          const fullName = `${matches[0].firstName} ${matches[0].lastName}`;
          const confirmed = confirm(`C'est bien vous ?\n\n${fullName}`);
          if (confirmed) {
            setCurrentUserEmail(fullName);
            setShowIdentificationBanner(false);
            return fullName;
          }
          return null;
        }
        
        // Plusieurs matches
        const options = matches.map((c, i) => `${i+1}. ${c.firstName} ${c.lastName}`).join('\n');
        const choice = prompt(`Plusieurs "${firstName}" trouvés. Entrez le numéro correspondant :\n\n${options}`);
        
        const index = parseInt(choice) - 1;
        if (index >= 0 && index < matches.length) {
          const fullName = `${matches[index].firstName} ${matches[index].lastName}`;
          setCurrentUserEmail(fullName);
          setShowIdentificationBanner(false);
          return fullName;
        }
        
        return null;
      }

        try {
          const updateData = {};
          
          if (field === 'firstName') updateData.first_name = value;
          if (field === 'lastName') updateData.last_name = value;
          if (field === 'maidenName') updateData.maiden_name = value || null;
          if (field === 'email') updateData.email = value || null;
          if (field === 'phone') {
            // Nettoyer et valider le numéro avant de l'envoyer
            updateData.phone = cleanPhoneNumber(value);
          }
          
          // Si un contributeur est fourni ET qu'il n'est pas "Non identifié", on met à jour le added_by
          if (contributor && contributor !== 'Non identifié' && (field === 'email' || field === 'phone')) {
            updateData.added_by = contributor;
          }
          
          await supabaseRequest(`contacts?id=eq.${contactId}`, 'PATCH', updateData);
          
          // Mettre à jour localement
          setSavedContacts(savedContacts.map(c =>
            c.id === contactId ? { 
              ...c, 
              [field]: value,
              ...(contributor && contributor !== 'Non identifié' && (field === 'email' || field === 'phone') ? { addedBy: contributor } : {})
            } : c
          ));
        } catch (error) {
          console.error('Erreur de mise à jour:', error);
          alert('Erreur lors de la mise à jour');
        }
      }

      const handleLike = async (contactId) => {
        // Vérifier que l'utilisateur est identifié
        if (!currentUserEmail) {
          alert("Vous devez vous identifier pour utiliser cette fonctionnalité.");
          return;
        }

        // Trouver le contact
        const contact = savedContacts.find(c => c.id === contactId);
        if (!contact) return;

        // Vérifier qu'on ne se like pas soi-même
        const myFullName = currentUserEmail;
        const contactFullName = `${contact.firstName} ${contact.lastName}`;
        if (myFullName === contactFullName) {
          alert("Vous ne pouvez pas vous envoyer de cœur à vous-même ! 😊");
          return;
        }

        // Vérifier si déjà liké
        const likedBy = contact.likedBy || [];
        if (likedBy.includes(myFullName)) {
          alert("Vous avez déjà envoyé votre hâte de revoir cette personne ! 💜");
          return;
        }

        try {
          // Mettre à jour dans Supabase
          const newLikedBy = [...likedBy, myFullName];
          const newCount = newLikedBy.length;

          await supabaseRequest(`contacts?id=eq.${contactId}`, 'PATCH', {
            likes_count: newCount,
            liked_by: newLikedBy
          });

          // Mettre à jour localement
          setSavedContacts(savedContacts.map(c =>
            c.id === contactId ? {
              ...c,
              likesCount: newCount,
              likedBy: newLikedBy
            } : c
          ));

          // Animation de succès
// Envoyer la notification email si la personne a un email
          if (contact.email) {
            try {
              await fetch('/.netlify/functions/send-like-notification', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  firstName: contact.firstName,
                  email: contact.email,
                  likesCount: newCount
                })
              });
            } catch (error) {
              console.error('Erreur notification like:', error);
            }
          }

          alert("💜 Votre message a été envoyé !");
        } catch (error) {
          console.error('Erreur lors du like:', error);
          alert('Erreur lors de l\'envoi');
        }

        const newRevealed = new Set(revealedContacts);
        if (newRevealed.has(contactId)) {
          newRevealed.delete(contactId);

      const maskEmail = (email) => {
        if (!email) return '';
        const [local, domain] = email.split('@');
        if (local.length <= 2) return email;
        return local[0] + '***' + local[local.length - 1] + '@' + domain;

        if (!phone) return '';
        // Nettoyer le numéro (enlever espaces, tirets, etc.)
        const cleaned = phone.replace(/\s+/g, '').replace(/-/g, '');
        if (cleaned.length <= 4) return cleaned;
        
        // Pour les numéros français (10 chiffres commençant par 0)
        if (cleaned.length === 10 && cleaned.startsWith('0')) {
          return cleaned.substring(0, 2) + '***' + cleaned.substring(cleaned.length - 2);
        }
        
        // Pour les autres formats
        return cleaned.substring(0, 2) + '***' + cleaned.substring(cleaned.length - 2);
      };

        if (cleaned.length === 9 && /^[67]/.test(cleaned)) {

        // Validation pour numéro français (10 chiffres commençant par 0)
        if (cleaned.length === 10 && cleaned.startsWith('0')) {

                              type="text"
                              value={contact.firstName}
                              onChange={(e) => updateContact(contact.id, 'firstName', e.target.value)}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                              placeholder="Prénom"
                            />
                          </div>
                          
                          <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                              Nom <span className="text-red-500">*</span>
                            </label>
                            <input
                              type="text"
                              value={contact.lastName}
                              onChange={(e) => updateContact(contact.id, 'lastName', e.target.value)}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                              placeholder="Nom"
                            />
                          </div>
                          
                          <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                              Nom de jeune fille
                            </label>
                            <input
                              type="text"
                              value={contact.maidenName}
                              onChange={(e) => updateContact(contact.id, 'maidenName', e.target.value)}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                              placeholder="Nom de jeune fille (optionnel)"
                            />
                          </div>
                          
                          <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input
                              type="email"
                              value={contact.email}
                              onChange={(e) => updateContact(contact.id, 'email', e.target.value)}
                              className={`w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent ${
                                contact.emailTouched && contact.email && !validateEmail(contact.email)
                                  ? 'border-red-500 bg-red-50'
                                  : 'border-gray-300'
                              }`}
                              placeholder="email@exemple.com"
                            />
                            {contact.emailTouched && contact.email && !validateEmail(contact.email) && (
                              <p className="text-red-500 text-xs mt-1">Email invalide</p>
                            )}
                          </div>
                          
                          <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
                            <input
                              type="tel"
                              value={contact.phone}
                              onChange={(e) => updateContact(contact.id, 'phone', e.target.value)}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                              placeholder="06 12 34 56 78"
                            />
                          </div>
                        </div>
                      </div>
                    ))}
                    
                    <div className="flex gap-3 mt-6">
                      <button
                        onClick={addContact}
                        className="flex items-center gap-2 px-4 py-2 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200 transition-colors text-sm font-medium"
                      >
                        <PlusIcon />
                        Ajouter un proche
                      </button>
                      
                      <button
                        onClick={saveContacts}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition-colors font-medium shadow-md hover:shadow-lg"
                      >
                        Enregistrer tous les contacts
                      </button>
                    </div>
                  </div>
                )}

                {/* Leaderboard */}
                {showLeaderboard && (
                  <div className="mb-8 bg-gradient-to-br from-amber-50 to-yellow-50 rounded-lg p-6 border-2 border-amber-200">
                    <div className="flex items-center gap-3 mb-4">
                      <TrophyIcon size={28} />
                      <h2 className="text-2xl font-semibold text-gray-800">Top Contributeurs</h2>
                    </div>
                    <p className="text-sm text-gray-600 mb-4">10 points par contact | +15 points si profil complet (email + tél)</p>
                    
                    <div className="space-y-3">
                      {leaderboard.slice(0, 10).map((contributor, index) => (
                        <div key={contributor.email} className="bg-white rounded-lg p-4 shadow-sm flex items-center justify-between">
                          <div className="flex items-center gap-4">
                            <div className={`text-2xl font-bold ${index === 0 ? 'text-yellow-500' : index === 1 ? 'text-gray-400' : index === 2 ? 'text-amber-700' : 'text-gray-400'}`}>
                              {index + 1}
                            </div>
                            <div>
                              <p className="font-medium text-gray-800">{contributor.email}</p>
                              <p className="text-xs text-gray-500">{contributor.contactsAdded} contact{contributor.contactsAdded > 1 ? 's' : ''} • {contributor.completeProfiles} complet{contributor.completeProfiles > 1 ? 's' : ''}</p>
                            </div>
                          </div>
                          <div className="text-right">
                            <p className="text-xl font-bold text-indigo-600">{contributor.points}</p>
                            <p className="text-xs text-gray-500">points</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Liste des contacts - Simplifiée pour l'HTML */}
                {showList && (
                  <div>
                    <div className="flex items-center justify-between mb-4">
                      <h2 className="text-2xl font-semibold text-gray-800">
                        Liste des contacts ({filteredContacts.length})
                      </h2>
                      <div className="relative">
                        <div className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">
                          <SearchIcon />
                        </div>
                        <input
                          type="text"
                          value={searchTerm}
                          onChange={(e) => setSearchTerm(e.target.value)}
                          placeholder="Rechercher..."
                          className="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        />
                      </div>
                    </div>

                    <div className="bg-white rounded-lg shadow overflow-hidden">
                      <div className="overflow-x-auto">
                        <table className="w-full">
                          <thead className="bg-gray-50 border-b-2 border-gray-200">
                            <tr>
                              <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nom</th>
                              <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nom de jeune fille</th>
                              <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                              <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Téléphone</th>
                              {currentUserEmail && (
                                <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">💜</th>
                              )}
                              <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Complétude</th>
                            </tr>
                          </thead>
                          <tbody className="bg-white divide-y divide-gray-200">
                            {filteredContacts.map((contact) => {
                              const isRevealed = revealedContacts.has(contact.id);
                              const isComplete = contact.email && contact.phone;
                              
                              return (
                                <tr key={contact.id} className="hover:bg-gray-50">
                                  <td className="px-6 py-4 whitespace-nowrap">
                                    <div className="flex items-center gap-2">
                                      <span className="font-medium text-gray-900">{contact.firstName} {contact.lastName}</span>
                                      {isComplete && <StarIcon filled={true} />}
                                    </div>
                                  </td>
                                  
                                  <td className="px-6 py-4 whitespace-nowrap">
                                    <span className="text-sm text-gray-600">{contact.maidenName || '-'}</span>
                                  </td>
                                  
                                  <td className="px-6 py-4">
                                    <div className="flex items-center gap-2">
                                      {contact.email ? (
                                        <>
                                          <MailIcon className={contact.emailVerified ? "text-green-500" : "text-gray-400"} />
                                          {editingContact === contact.id && editingField === 'email' ? (
                                            <input
                                              type="email"
                                              defaultValue={contact.email}
                                              onBlur={(e) => {
                                                updateSavedContact(contact.id, 'email', e.target.value);
                                                setEditingContact(null);
                                                setEditingField(null);
                                              }}
                                              className="border rounded px-2 py-1 text-sm w-full"
                                              autoFocus
                                            />
                                          ) : (
                                            <>
                                              <span className="text-sm text-gray-900">
                                                {isAdmin && isRevealed ? contact.email : maskEmail(contact.email)}
                                              </span>
                                              {isAdmin && (
                                                <>
                                                  <button 
                                                    onClick={() => toggleReveal(contact.id)} 
                                                    className="text-gray-400 hover:text-indigo-600"
                                                  >
                                                    {isRevealed ? <LockIcon size={14} /> : <UnlockIcon size={14} />}
                                                  </button>
                                                  <button 
                                                    onClick={() => { setEditingContact(contact.id); setEditingField('email'); }} 
                                                    className="text-gray-400 hover:text-indigo-600"
                                                  >
                                                    <Edit2Icon />
                                                  </button>
                                                </>
                                              )}
                                            </>
                                          )}
                                        </>
                                      ) : (
                                        <>
                                          <MailIcon className="text-gray-300 cursor-pointer hover:text-indigo-500" 
                                            onClick={async () => {
                                              const contributor = await identifyUser();
                                              if (!contributor) return;
                                              
                                              const email = prompt('Ajouter un email pour ' + contact.firstName + ' ' + contact.lastName + ' :');
                                              if (email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                                                await updateSavedContact(contact.id, 'email', email, contributor);
                                              } else if (email) {
                                                alert('Email invalide');
                                              }
                                            }}
                                          />
                                          <span className="text-sm text-gray-400 italic cursor-pointer hover:text-indigo-600"
                                            onClick={async () => {
                                              const contributor = await identifyUser();
                                              if (!contributor) return;
                                              
                                              const email = prompt('Ajouter un email pour ' + contact.firstName + ' ' + contact.lastName + ' :');
                                              if (email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                                                await updateSavedContact(contact.id, 'email', email, contributor);
                                              } else if (email) {
                                                alert('Email invalide');
                                              }
                                            }}
                                          >
                                            Cliquez pour ajouter
                                          </span>
                                        </>
                                      )}
                                    </div>
                                  </td>
                                  
                                  <td className="px-6 py-4">
                                    <div className="flex items-center gap-2">
                                      {contact.phone ? (
                                        <>
                                          <PhoneIcon className="text-gray-400" />
                                          {editingContact === contact.id && editingField === 'phone' ? (
                                            <input
                                              type="tel"
                                              defaultValue={contact.phone}
                                              onBlur={(e) => {
                                                updateSavedContact(contact.id, 'phone', e.target.value);
                                                setEditingContact(null);
                                                setEditingField(null);
                                              }}
                                              className="border rounded px-2 py-1 text-sm w-full"
                                              autoFocus
                                            />
                                          ) : (
                                            <>
                                              <span className="text-sm text-gray-900">
                                                {isAdmin && isRevealed ? contact.phone : maskPhone(contact.phone)}
                                              </span>
                                              {isAdmin && (
                                                <>
                                                  <button 
                                                    onClick={() => toggleReveal(contact.id)} 
                                                    className="text-gray-400 hover:text-indigo-600"
                                                  >
                                                    {isRevealed ? <LockIcon size={14} /> : <UnlockIcon size={14} />}
                                                  </button>
                                                  <button 
                                                    onClick={() => { setEditingContact(contact.id); setEditingField('phone'); }} 
                                                    className="text-gray-400 hover:text-indigo-600"
                                                  >
                                                    <Edit2Icon />
                                                  </button>
                                                </>
                                              )}
                                            </>
                                          )}
                                        </>
                                      ) : (
                                        <>
                                          <PhoneIcon className="text-gray-300 cursor-pointer hover:text-indigo-500" 
                                            onClick={async () => {
                                              const contributor = await identifyUser();
                                              if (!contributor) return;
                                              
                                              const phone = prompt('Ajouter un téléphone pour ' + contact.firstName + ' ' + contact.lastName + ' :');
                                              if (phone) {
                                                await updateSavedContact(contact.id, 'phone', phone, contributor);
                                              }
                                            }}
                                          />
                                          <span className="text-sm text-gray-400 italic cursor-pointer hover:text-indigo-600"
                                            onClick={async () => {
                                              const contributor = await identifyUser();
                                              if (!contributor) return;
                                              
                                              const phone = prompt('Ajouter un téléphone pour ' + contact.firstName + ' ' + contact.lastName + ' :');
                                              if (phone) {
                                                await updateSavedContact(contact.id, 'phone', phone, contributor);
                                              }
                                            }}
                                          >
                                            Cliquez pour ajouter
                                          </span>
                                        </>
                                      )}
                                    </div>
                                  </td>
                                  
                                  {/* Colonne "J'ai hâte de te revoir" - visible seulement si identifié */}
                                  {currentUserEmail && (
                                    <td className="px-6 py-4 whitespace-nowrap">
                                      <div className="flex items-center gap-2">
                                        {contact.likesCount > 0 && `${contact.firstName} ${contact.lastName}` === currentUserEmail && (
                                          <span className="text-sm text-pink-600 font-medium">
                                            💜 {contact.likesCount}
                                          </span>
                                        )}
                                        <button
                                          onClick={() => handleLike(contact.id)}
                                          className="text-gray-400 hover:text-pink-500 transition-colors p-1 hover:scale-110 transform"
                                          title="J'ai hâte de te revoir !"
                                        >
                                          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                          </svg>
                                        </button>
                                      </div>
                                    </td>
                                  )}
                                  
                                  <td className="px-6 py-4 whitespace-nowrap">
                                    <div className="flex items-center gap-2">
                                      <div className="w-full bg-gray-200 rounded-full h-2 max-w-[100px]">
                                        <div
                                          className={`h-2 rounded-full ${isComplete ? 'bg-green-500' : contact.email || contact.phone ? 'bg-yellow-500' : 'bg-red-500'}`}
                                          style={{ width: isComplete ? '100%' : (contact.email || contact.phone ? '50%' : '0%') }}
                                        ></div>
                                      </div>
                                      <span className="text-xs text-gray-600">
                                        {isComplete ? '100%' : (contact.email || contact.phone ? '50%' : '0%')}
                                      </span>
                                    </div>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Footer RGPD */}
            <div className="mt-8 text-center text-sm text-gray-600 bg-white rounded-lg p-6 shadow">
              <p className="mb-2">
                <strong>Protection des données personnelles (RGPD)</strong>
              </p>
              <p className="mb-2">
                Vos données sont utilisées uniquement pour l'organisation des retrouvailles EA 1996. 
                Vous disposez d'un droit d'accès, de rectification et de suppression.
              </p>
              <p>
                Contact : <a href="mailto:orga@ea1996.fr" className="text-indigo-600 hover:underline">orga@ea1996.fr</a>
              </p>
            </div>
          </div>

          {/* Modal Admin */}
          {showAdminModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
              <div className="bg-white rounded-lg p-8 max-w-md w-full mx-4">
                <h3 className="text-xl font-semibold mb-4">Accès Administrateur</h3>
                <input
                  type="password"
                  value={adminPassword}
                  onChange={(e) => setAdminPassword(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && handleAdminLogin()}
                  placeholder="Mot de passe"
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent mb-4"
                  autoFocus
                />
                <div className="flex gap-3">
                  <button
                    onClick={() => { setShowAdminModal(false); setAdminPassword(''); }}
                    className="flex-1 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50"
                  >
                    Annuler
                  </button>
                  <button
                    onClick={handleAdminLogin}
                    className="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700"
                  >
                    Connexion
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Badge flottant pour toggle mode rétro */}
          <div 
            className="retro-toggle-badge"
            onClick={toggleRetroMode}
          >
            {isRetroMode ? '🚀 Revenir en 2026' : '💾 Revenir en 1996?'}
          </div>
        </div>
      );
    }

    // Render l'application
    ReactDOM.render(<ContactForm />, document.getElementById('root'));
  </script>
</body>
</html>
